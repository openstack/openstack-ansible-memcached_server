- name: Verify memcached functionality
  hosts: memcached
  tasks:
    - name: Check memcache is running
      ansible.builtin.command: pgrep -a memcached
      changed_when: false
      register: memcached_proc

    - name: Test connecting to memcache
      ansible.builtin.shell: echo stats | nc -w5 127.0.0.1 11211
      changed_when: false
      register: memcached_stats

    - name: Check role functions
      vars:
        _memcached_user:
          redhat: memcached
          debian: memcache
      ansible.builtin.assert:
        that:
          - "'-p 11211' in memcached_proc.stdout"
          - "'-u ' ~ _memcached_user[ansible_facts['os_family'] | lower] in memcached_proc.stdout"
          - "'-l 127.0.0.1' in memcached_proc.stdout"
          - "'-c 4096' in memcached_proc.stdout"
          - "'-t 4' in memcached_proc.stdout"
          - "'STAT pid' in memcached_stats.stdout"
